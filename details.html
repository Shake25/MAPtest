<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Briefing | 战术详情</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap');
        :root { --retro-orange: #ffb000; --retro-bg: #121212; }
        body { background-color: var(--retro-bg); color: var(--retro-orange); font-family: 'Courier Prime', monospace; }
        .retro-border { border: 2px solid var(--retro-orange); }
        input { background: transparent; border: 1px solid var(--retro-orange); color: var(--retro-orange); outline: none; padding: 8px; font-size: 13px; }
        
        /* 地图黑金滤镜：解决显示问题并统一风格 */
        #map-container iframe {
            filter: invert(90%) hue-rotate(150deg) brightness(0.8) contrast(1.2);
            mix-blend-mode: screen;
        }
        .plan-card { border-left: 3px solid var(--retro-orange); background: rgba(255,176,0,0.03); }
        .tip-box { font-size: 10px; color: #fff; background: rgba(255,176,0,0.15); border-radius: 2px; padding: 4px 8px; margin-top: 6px; display: inline-block; font-style: italic; }
        .tag-icon { border: 1px solid var(--retro-orange); padding: 0 5px; font-size: 10px; font-weight: bold; margin-right: 8px; text-transform: uppercase; }
        
        /* 扫描线动画 */
        .scanline { width: 100%; height: 2px; background: rgba(255, 176, 0, 0.2); position: absolute; animation: scan 4s linear infinite; pointer-events: none; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto retro-border p-6 md:p-10 relative overflow-hidden">
        <div class="scanline"></div>
        <a href="index.html" class="text-[10px] uppercase hover:underline tracking-widest"><< 返回总台 [BACK_TO_ROOT]</a>
        
        <header class="mt-8 mb-10 border-b-2 border-[#ffb000] pb-6 flex justify-between items-end">
            <div>
                <h1 id="main-title" class="text-4xl font-bold uppercase tracking-widest italic">--</h1>
                <p id="main-info" class="text-[10px] mt-2 opacity-60 font-bold uppercase tracking-widest">>> 正在同步实时数据流...</p>
            </div>
            <div class="text-right">
                <p class="text-[10px] font-bold">LOC_ID</p>
                <p id="loc-num" class="text-3xl font-bold">00</p>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-12">
            <section>
                <h2 class="text-sm font-bold mb-6 uppercase tracking-widest border-b border-[#ffb000]/30 w-fit">>> 详细行动序列</h2>
                <div class="flex gap-2 mb-10">
                    <input id="sub-time" type="text" placeholder="Time" class="w-20">
                    <input id="sub-place" type="text" placeholder="输入：高铁、酒店、爬山、吃饭..." class="flex-1">
                    <button onclick="addSub()" class="bg-[#ffb000] text-black px-6 font-bold hover:bg-white transition-colors">ADD</button>
                </div>
                <div id="sub-list" class="space-y-6">
                    </div>
            </section>

            <section>
                <h2 class="text-sm font-bold mb-6 uppercase tracking-widest border-b border-[#ffb000]/30 w-fit">>> 实时坐标匹配</h2>
                <div id="map-container" class="retro-border h-[450px] bg-black relative overflow-hidden">
                    <iframe id="map-iframe" width="100%" height="100%" frameborder="0" scrolling="no" marginheight="0" marginwidth="0" src=""></iframe>
                    <div class="absolute top-2 right-2 bg-black/80 p-2 text-[8px] border border-[#ffb000]/40">RADAR_ACTIVE</div>
                </div>
            </section>
        </div>
    </div>

    <script>
        const travelData = JSON.parse(localStorage.getItem('retro_travel_data'));
        const index = localStorage.getItem('current_trip_index');
        const trip = travelData[index];

        const config = {
            keywords: {
                '高铁': { label: 'TRANSIT', icon: '🚄', tip: '建议提前30min到站，高铁站较大，预留检票步程。' },
                '车': { label: 'TRANSIT', icon: '🚗', tip: '检查离线地图，确保电量/油量充足。' },
                '机': { label: 'TRANSIT', icon: '✈️', tip: '确认航站楼信息，起飞前2小时到达。' },
                '酒店': { label: 'LODGING', icon: '🏨', tip: '确认是否有一次性用品，提前联系前台保留房间。' },
                '住': { label: 'LODGING', icon: '🏠', tip: '确认退房时间限制。' },
                '爬山': { label: 'ACTION', icon: '🏔️', tip: '检查天气，备好护膝与速干衣物。' },
                '徒步': { label: 'ACTION', icon: '🥾', tip: '轻量化负重，保持匀速，注意轨迹。' },
                '玩': { label: 'ACTION', icon: '🎡', tip: '提前购票避免排队，留意闭园时间。' },
                '餐': { label: 'SUPPLY', icon: '🍴', tip: '高峰期建议提前排号。' },
                '吃': { label: 'SUPPLY', icon: '🍚', tip: '注意饮食卫生，备好肠胃药。' }
            },
            default: { label: 'TARGET', icon: '📍', tip: '到达目的地后确认环境安全，同步坐标。' }
        };

        function render() {
            document.getElementById('main-title').innerText = trip.title;
            const list = document.getElementById('sub-list');
            list.innerHTML = '';
            
            trip.sub_plans.forEach((p, i) => {
                let meta = config.default;
                for (let key in config.keywords) {
                    if (p.place.includes(key)) { meta = config.keywords[key]; break; }
                }

                const item = document.createElement('div');
                item.className = 'plan-card p-4 relative group';
                item.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div>
                            <div class="flex items-center">
                                <span class="tag-icon">${meta.label}</span>
                                <span class="text-xs font-bold opacity-50 mr-3">${p.time}</span>
                                <span class="font-bold tracking-widest text-lg">${meta.icon} ${p.place}</span>
                            </div>
                            <div class="tip-box">
                                <span class="mr-2">💡</span>RECOM: ${meta.tip}
                            </div>
                        </div>
                        <button onclick="delSub(${i})" class="text-[9px] opacity-0 group-hover:opacity-100 hover:text-white transition-opacity">/ DELETE</button>
                    </div>
                `;
                list.appendChild(item);
            });

            document.getElementById('loc-num').innerText = trip.sub_plans.length.toString().padStart(2, '0');
            updateMap();
            localStorage.setItem('retro_travel_data', JSON.stringify(travelData));
        }

        function addSub() {
            const time = document.getElementById('sub-time').value || '--:--';
            const place = document.getElementById('sub-place').value;
            if (!place) return;
            trip.sub_plans.push({ time, place });
            document.getElementById('sub-time').value = '';
            document.getElementById('sub-place').value = '';
            render();
        }

        function delSub(i) {
            trip.sub_plans.splice(i, 1);
            render();
        }

        function updateMap() {
            if (trip.sub_plans.length > 0) {
                const latestPlace = trip.sub_plans[trip.sub_plans.length - 1].place;
                // 使用 OpenStreetMap 的搜索预览界面，更稳定
                const url = `https://www.openstreetmap.org/export/embed.html?bbox=0,0,0,0&layer=mapnik&q=${encodeURIComponent(latestPlace)}`;
                // 备用：Nominatim 搜索
                const searchUrl = `https://www.google.com/maps?q=${encodeURIComponent(latestPlace)}&output=embed`;
                document.getElementById('map-iframe').src = searchUrl;
            } else {
                // 默认显示一个空坐标效果
                document.getElementById('map-iframe').src = "about:blank";
            }
        }

        window.onload = render;
    </script>
</body>
</html>
