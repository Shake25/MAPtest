<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mission Control | 行为序列终端 V8.5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    
    <script type="text/javascript">
        window._AMapSecurityConfig = {
            securityJsCode: 'c379450921e2ff6925d456b927967e12', 
        }
    </script>
    <script type="text/javascript" src="https://webapi.amap.com/maps?v=2.0&key=b9b83a0b36e76e2e6f06ecd7dbfb4776&plugin=AMap.Geocoder"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap');
        :root { --retro-orange: #ffb000; --retro-bg: #0a0a0a; }
        body { background-color: var(--retro-bg); color: var(--retro-orange); font-family: 'Courier Prime', monospace; margin: 0; overflow-x: hidden; }
        
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-image: linear-gradient(rgba(255, 176, 0, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 176, 0, 0.05) 1px, transparent 1px);
            background-size: 30px 30px; pointer-events: none; z-index: -1;
        }

        .map-frame { height: 100%; min-height: 500px; border: 1px solid var(--retro-orange); background: #000; position: relative; }
        #map-container { width: 100%; height: 100%; }
        
        /* 深度任务卡片 */
        .plan-card { background: rgba(255, 176, 0, 0.03); border: 1px solid rgba(255, 176, 0, 0.15); margin-bottom: 15px; position: relative; }
        .plan-card:hover { border-color: var(--retro-orange); background: rgba(255, 176, 0, 0.08); }
        .drag-handle { cursor: grab; width: 30px; display: flex; align-items: center; justify-content: center; background: rgba(255, 176, 0, 0.1); font-weight: bold; }
        
        /* 标签样式 */
        .tag-logic { font-size: 10px; padding: 2px 6px; background: rgba(255, 176, 0, 0.1); border: 1px solid var(--retro-orange); color: var(--retro-orange); }
        .tag-action { border-left: 2px solid var(--retro-orange); padding-left: 8px; margin-top: 8px; font-size: 11px; color: #eee; }
        .tag-warning { border-left: 2px solid #ff4444; background: rgba(255, 68, 68, 0.1); padding: 4px 8px; margin-top: 8px; font-size: 11px; color: #ff8888; animation: pulse 2s infinite; }
        
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }

        input { background: rgba(0,0,0,0.8); border: 1px solid var(--retro-orange); color: var(--retro-orange); padding: 10px; font-size: 14px; outline: none; }
        .amap-logo, .amap-copyright { display: none !important; }
    </style>
</head>
<body class="p-4 lg:p-8">
    <div class="max-w-[1600px] mx-auto flex flex-col min-h-[92vh]">
        
        <header class="mb-6 border-b-2 border-[#ffb000] pb-4 flex justify-between items-end">
            <div>
                <div class="text-[10px] bg-[#ffb000] text-black px-2 inline-block font-bold mb-2">M-SYS_LOGISTICS_V8.5_HYBRID</div>
                <h1 class="text-4xl font-black italic tracking-tighter uppercase text-white">Mission Control</h1>
                <p class="text-xs opacity-60 mt-1">>> [系统状态]：在线 | 天气：晴 26°C | MOMORECOM 解析引擎已就绪</p>
            </div>
            <div class="text-right">
                <span class="text-[10px] opacity-50 uppercase">Active_Nodes</span><br>
                <span id="loc-num" class="text-5xl font-bold italic text-[#ffb000]">00</span>
            </div>
        </header>

        <div class="flex flex-col lg:grid lg:grid-cols-12 gap-8 flex-1">
            <div class="lg:col-span-5 flex flex-col h-full">
                <div class="flex gap-2 mb-6">
                    <input id="sub-time" type="text" placeholder="HH:MM" class="w-20 text-center font-bold">
                    <input id="sub-place" type="text" placeholder="输入坐标 (如: 太平山顶、红茶餐厅)" class="flex-1">
                    <button onclick="addSub()" class="bg-[#ffb000] text-black px-6 font-bold text-xs uppercase hover:bg-white transition-all">部署</button>
                </div>
                <div id="sub-list" class="flex-1 overflow-y-auto space-y-4 pr-2 max-h-[70vh]">
                    </div>
            </div>

            <div class="lg:col-span-7 flex flex-col h-full">
                <div class="map-frame">
                    <div id="map-container"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 1. 强化版知识库 (智能分类与动作指令)
        const INTEL_DB = {
            '高铁': { icon: '🚄', cat: 'TRANSIT', task: '执行铁路位移', action: '核对发车时间，预留30分钟安检/通关，确认行李存储空间。' },
            '地铁': { icon: '🚇', cat: 'TRANSIT', task: '城市轨道穿梭', action: '准备扫码/八达通，注意换乘站点。' },
            '餐厅': { icon: '🍽️', cat: 'FOOD', task: '能量补给', action: '执行地道扫街，避开高峰排队，推荐必点特色。' },
            '冰室': { icon: '🍽️', cat: 'FOOD', task: '港式补给', action: '体验地道风味，推荐：冻奶茶、菠萝油。' },
            '山顶': { icon: '⛰️', cat: 'PLAY', task: '环境扫描', action: '乘坐缆车抵达，执行全景扫描，确认能见度参数。', warning: '如能见度低于5公里，建议切换至 Plan B 购物行程。' },
            '购物': { icon: '🛍️', cat: 'SHOPPING', task: '物资采购', action: '比对汇率价格，扫描品牌分布，执行退税流程。' },
            '商场': { icon: '🛍️', cat: 'SHOPPING', task: '物资采购', action: '检查退税点，同步最新折扣信息。' },
            '酒店': { icon: '🏨', cat: 'LODGING', task: '战术休整', action: '办理 Check-in，确认 WiFi 通信及周边安全出口。' },
            '民宿': { icon: '🏨', cat: 'LODGING', task: '战术休整', action: '确认自助入住密码。' }
        };

        let map, geocoder, polyline;
        let markers = [];
        let tripData = [
            { time: "07:30", place: "深圳北站" },
            { time: "09:00", place: "红茶餐厅" },
            { time: "10:30", place: "太平山顶" }
        ];

        // 2. 初始化高德地图
        function initMap() {
            map = new AMap.Map('map-container', {
                viewMode: '3D',
                zoom: 12,
                center: [114.05, 22.54],
                mapStyle: 'amap://styles/darkblue'
            });
            geocoder = new AMap.Geocoder();
            polyline = new AMap.Polyline({
                path: [],
                strokeColor: "#ffb000",
                strokeWeight: 4,
                strokeStyle: "dashed",
                strokeDasharray: [10, 10],
                showDir: true
            });
            map.add(polyline);
            render();
        }

        // 3. 智能解析与渲染
        async function render() {
            const list = document.getElementById('sub-list');
            list.innerHTML = '';
            map.remove(markers);
            markers = [];
            let pathPositions = [];

            for (let i = 0; i < tripData.length; i++) {
                const item = tripData[i];
                // 语义匹配
                const metaKey = Object.keys(INTEL_DB).find(k => item.place.includes(k));
                const meta = metaKey ? INTEL_DB[metaKey] : { icon: '📍', cat: 'TASK', task: '区域探索', action: '到达后确认环境安全，同步实时坐标。' };

                // UI 卡片构建
                const card = document.createElement('div');
                card.className = 'plan-card flex';
                card.innerHTML = `
                    <div class="drag-handle text-[#ffb000]/50">::</div>
                    <div class="p-4 flex-1">
                        <div class="flex justify-between items-start mb-2 border-b border-[#ffb000]/20 pb-2">
                            <div class="flex items-center gap-3">
                                <span class="bg-[#ffb000] text-black px-2 font-bold text-xs">${meta.icon} ${item.time}</span>
                                <span class="text-lg font-bold text-white tracking-widest">${item.place}</span>
                            </div>
                            <button onclick="delSub(${i})" class="text-[10px] opacity-40 hover:opacity-100">✕ ERASE</button>
                        </div>
                        <div class="space-y-1">
                            <div class="text-[11px]"><span class="tag-logic">[ ${meta.cat} ]</span> 任务：${meta.task}</div>
                            <div class="tag-action"><b class="text-[#ffb000]">MOMORECOM (ACTION)：</b>${meta.action}</div>
                            ${meta.warning ? `<div class="tag-warning">⚠️ 系统指令：${meta.warning}</div>` : ''}
                        </div>
                    </div>
                `;
                list.appendChild(card);

                // 坐标解析
                try {
                    const pos = await new Promise(resolve => {
                        geocoder.getLocation(item.place, (s, r) => resolve(s === 'complete' && r.geocodes.length ? r.geocodes[0].location : null));
                    });
                    if (pos) {
                        pathPositions.push(pos);
                        const marker = new AMap.Marker({
                            position: pos,
                            content: `<div style="background:#ffb000; color:#000; width:22px; height:22px; border-radius:50%; text-align:center; line-height:22px; font-weight:bold; font-size:11px; border:2px solid #000;">${i+1}</div>`,
                            offset: new AMap.Pixel(-11, -11)
                        });
                        markers.push(marker);
                        map.add(marker);
                    }
                } catch (e) {}
            }

            if (pathPositions.length > 0) {
                polyline.setPath(pathPositions);
                map.setFitView([polyline, ...markers], false, [60, 60, 60, 60]);
            }
            document.getElementById('loc-num').innerText = tripData.length.toString().padStart(2, '0');
        }

        // 4. 基础交互
        function addSub() {
            const time = document.getElementById('sub-time').value || '12:00';
            const place = document.getElementById('sub-place').value;
            if (!place) return;
            tripData.push({ time, place });
            document.getElementById('sub-place').value = '';
            render();
        }

        function delSub(i) {
            tripData.splice(i, 1);
            render();
        }

        Sortable.create(document.getElementById('sub-list'), {
            handle: '.drag-handle',
            animation: 200,
            onEnd: (evt) => {
                const item = tripData.splice(evt.oldIndex, 1)[0];
                tripData.splice(evt.newIndex, 0, item);
                render();
            }
        });

        window.onload = initMap;
    </script>
</body>
</html>
