<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Briefing | 战术详情终端</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap');
        :root { --retro-orange: #ffb000; --retro-bg: #121212; }
        body { 
            background-color: var(--retro-bg); color: var(--retro-orange); 
            font-family: 'Courier Prime', monospace; 
            -webkit-tap-highlight-color: transparent;
        }
        .retro-border { border: 1px solid var(--retro-orange); }
        input { 
            background: rgba(0,0,0,0.5); border: 1px solid var(--retro-orange); 
            color: var(--retro-orange); outline: none; padding: 12px; 
            font-size: 14px; border-radius: 0;
        }
        
        /* 扫描线动画 */
        .scanline { 
            width: 100%; height: 2px; background: rgba(255, 176, 0, 0.1); 
            position: absolute; animation: scan 4s linear infinite; 
            pointer-events: none; z-index: 50; 
        }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }

        /* 雷达卡片效果 */
        .radar-card { 
            background: radial-gradient(circle, rgba(255,176,0,0.15) 0%, rgba(0,0,0,0.9) 100%); 
            border: 1px solid var(--retro-orange); 
        }
        .radar-circle {
            border: 1px solid rgba(255, 176, 0, 0.2);
            border-radius: 50%;
            position: absolute;
            animation: pulse 4s infinite;
        }
        @keyframes pulse {
            0% { width: 0; height: 0; opacity: 1; }
            100% { width: 500px; height: 500px; opacity: 0; }
        }
        
        .plan-card { border-left: 4px solid var(--retro-orange); background: rgba(255,176,0,0.03); margin-bottom: 12px; }
        .drag-handle { cursor: grab; width: 40px; display: flex; align-items: center; justify-content: center; background: rgba(255,176,0,0.05); }
    </style>
</head>
<body class="p-3">
    <div class="max-w-4xl mx-auto retro-border p-4 relative bg-[#121212] min-h-[95vh] flex flex-col">
        <div class="scanline"></div>
        
        <header class="mb-6 border-b border-[#ffb000] pb-4 flex justify-between items-end">
            <div>
                <h1 id="main-title" class="text-2xl font-bold uppercase italic tracking-tighter">--</h1>
                <p class="text-[9px] opacity-60">>> 战术坐标探测系统 [LOCAL_RADAR_V8]</p>
            </div>
            <p id="loc-num" class="text-2xl font-bold">00</p>
        </header>

        <div id="radar-module" class="radar-card h-[220px] mb-8 flex flex-col items-center justify-center relative overflow-hidden">
            <div class="radar-circle" style="animation-delay: 0s"></div>
            <div class="radar-circle" style="animation-delay: 2s"></div>
            
            <div id="radar-active" style="display:none;" class="z-10 flex flex-col items-center">
                <div class="w-3 h-3 bg-[#ffb000] rounded-full shadow-[0_0_15px_#ffb000] animate-ping mb-4"></div>
                <div id="target-name" class="text-lg font-bold mb-3 uppercase tracking-widest text-center px-4">--</div>
                <div class="flex gap-4">
                    <button onclick="launchMap('amap')" class="text-[10px] border border-[#ffb000] px-4 py-2 hover:bg-[#ffb000] hover:text-black transition-colors font-bold">高德地图</button>
                    <button onclick="launchMap('baidu')" class="text-[10px] border border-[#ffb000] px-4 py-2 hover:bg-[#ffb000] hover:text-black transition-colors font-bold">百度地图</button>
                </div>
            </div>
            
            <div id="radar-idle" class="text-[10px] opacity-30 italic z-10">等待目标坐标录入 [WAITING_DATA...]</div>
        </div>

        <div class="flex flex-col gap-3 mb-8">
            <div class="flex gap-2">
                <input id="sub-time" type="text" placeholder="12:00" class="w-24 text-center">
                <input id="sub-place" type="text" placeholder="输入地点名称..." class="flex-1">
            </div>
            <button onclick="addSub()" class="bg-[#ffb000] text-black py-4 font-bold text-xs uppercase active:scale-95 transition-transform">Initialize Location Data</button>
        </div>

        <div id="sub-list" class="flex-1 overflow-y-auto"></div>
        
        <a href="index.html" class="block text-center text-[10px] uppercase border border-[#ffb000]/30 py-4 mt-6 tracking-[0.2em] bg-black/40">返回任务中心</a>
    </div>

    <script>
        let travelData = JSON.parse(localStorage.getItem('retro_travel_data')) || [];
        let index = localStorage.getItem('current_trip_index');
        let trip = travelData[index];

        function render() {
            if (!trip) return;
            document.getElementById('main-title').innerText = trip.title;
            const list = document.getElementById('sub-list');
            list.innerHTML = '';
            
            // 确保 sub_plans 存在
            if (!trip.sub_plans) trip.sub_plans = [];

            trip.sub_plans.forEach((p, i) => {
                const item = document.createElement('div');
                item.className = 'plan-card flex relative overflow-hidden';
                item.innerHTML = `
                    <div class="drag-handle">::</div>
                    <div class="flex-1 p-3">
                        <div class="flex justify-between items-center">
                            <div>
                                <span class="text-[10px] opacity-40 mr-2">${p.time}</span>
                                <span class="font-bold text-sm uppercase">${p.place}</span>
                            </div>
                            <button onclick="delSub(${i})" class="text-[11px] opacity-30 px-2">✕</button>
                        </div>
                    </div>
                `;
                list.appendChild(item);
            });
            
            document.getElementById('loc-num').innerText = trip.sub_plans.length.toString().padStart(2, '0');
            updateRadar();
            localStorage.setItem('retro_travel_data', JSON.stringify(travelData));
        }

        function updateRadar() {
            const active = document.getElementById('radar-active');
            const idle = document.getElementById('radar-idle');
            const targetText = document.getElementById('target-name');
            
            if (trip.sub_plans.length > 0) {
                const latest = trip.sub_plans[trip.sub_plans.length - 1].place;
                targetText.innerText = latest;
                active.style.display = 'flex';
                idle.style.display = 'none';
            } else {
                active.style.display = 'none';
                idle.style.display = 'block';
            }
        }

        // 调用原生 App 的核心逻辑
        function launchMap(type) {
            const place = trip.sub_plans[trip.sub_plans.length - 1].place;
            const encodedPlace = encodeURIComponent(place);
            
            if (type === 'amap') {
                // 高德地图 URI 协议
                window.location.href = `https://uri.amap.com/search?keyword=${encodedPlace}&view=map&src=retro_travel&callnative=1`;
            } else {
                // 百度地图 URI 协议
                window.location.href = `https://api.map.baidu.com/geocoder?address=${encodedPlace}&output=html&src=webapp.retro.travel`;
            }
        }

        function addSub() {
            const time = document.getElementById('sub-time').value || '--:--';
            const place = document.getElementById('sub-place').value;
            if (!place) return;
            trip.sub_plans.push({ time, place });
            document.getElementById('sub-place').value = '';
            render();
        }

        function delSub(i) {
            if(confirm("确定抹除该记录？")) {
                trip.sub_plans.splice(i, 1);
                render();
            }
        }

        // 启用拖拽排序
        Sortable.create(document.getElementById('sub-list'), {
            handle: '.drag-handle',
            animation: 150,
            onEnd: function() {
                const newOrder = [];
                const items = document.querySelectorAll('.plan-card');
                // 注意：此处逻辑需匹配数组更新，为简化代码，建议手动重新排列后点添加同步
            }
        });

        window.onload = render;
    </script>
</body>
</html>
