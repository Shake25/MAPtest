<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Briefing | 战术详情终端</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap');
        :root { --retro-orange: #ffb000; --retro-bg: #121212; }
        body { background-color: var(--retro-bg); color: var(--retro-orange); font-family: 'Courier Prime', monospace; -webkit-tap-highlight-color: transparent; }
        .retro-border { border: 1px solid var(--retro-orange); }
        input { background: rgba(0,0,0,0.5); border: 1px solid var(--retro-orange); color: var(--retro-orange); outline: none; padding: 12px; font-size: 14px; border-radius: 0; }
        
        /* 地图滤镜：确保在深色模式下有“终端雷达”感 */
        #map-img { filter: invert(95%) hue-rotate(150deg) brightness(0.7) contrast(1.3); width: 100%; height: 100%; object-fit: cover; }

        .plan-card { border-left: 4px solid var(--retro-orange); background: rgba(255,176,0,0.03); }
        .drag-handle { cursor: grab; background: rgba(255, 176, 0, 0.1); display: flex; align-items: center; justify-content: center; width: 44px; font-size: 18px; font-weight: bold; border-right: 1px solid rgba(255, 176, 0, 0.1); }
        .sortable-ghost { opacity: 0.1; background: var(--retro-orange) !important; }
        
        .tip-box { font-size: 10px; color: #fff; background: rgba(255,176,0,0.15); padding: 5px 8px; margin-top: 6px; display: block; border-radius: 2px; }
        .tag-icon { border: 1px solid var(--retro-orange); padding: 0 4px; font-size: 9px; font-weight: bold; margin-right: 6px; text-transform: uppercase; }
        .scanline { width: 100%; height: 2px; background: rgba(255, 176, 0, 0.05); position: absolute; animation: scan 4s linear infinite; pointer-events: none; z-index: 50; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
    </style>
</head>
<body class="p-3">
    <div class="max-w-6xl mx-auto retro-border p-4 relative bg-[#121212] overflow-hidden">
        <div class="scanline"></div>
        <header class="mb-6 border-b border-[#ffb000] pb-4 flex justify-between items-end">
            <div>
                <h1 id="main-title" class="text-2xl font-bold uppercase italic tracking-tighter">--</h1>
                <p class="text-[9px] opacity-60">>> 正在同步本地地理序列 [SYNC_LOCAL_RADAR]</p>
            </div>
            <p id="loc-num" class="text-2xl font-bold">00</p>
        </header>

        <div id="map-container" class="retro-border h-[250px] mb-6 bg-black relative flex items-center justify-center overflow-hidden">
            <img id="map-img" style="display:none;" />
            <div id="map-placeholder" class="absolute text-[10px] opacity-30 italic">WAITING_FOR_COORDINATES...</div>
        </div>

        <div class="flex gap-2 mb-8">
            <input id="sub-time" type="text" placeholder="12:00" class="w-20 text-center">
            <input id="sub-place" type="text" placeholder="输入具体地点（如：香港西九龙）" class="flex-1">
            <button onclick="addSub()" class="bg-[#ffb000] text-black px-4 font-bold text-xs uppercase">Add</button>
        </div>

        <div id="sub-list" class="space-y-4 mb-10"></div>
        
        <a href="index.html" class="block text-center text-[10px] uppercase border border-[#ffb000]/30 py-3 mt-4 tracking-[0.2em]"><< BACK_TO_CONTROL_CENTER</a>
    </div>

    <script>
        let travelData = JSON.parse(localStorage.getItem('retro_travel_data')) || [];
        let index = localStorage.getItem('current_trip_index');
        let trip = travelData[index];

        function render() {
            if (!trip) return;
            document.getElementById('main-title').innerText = trip.title;
            const list = document.getElementById('sub-list');
            list.innerHTML = '';
            
            trip.sub_plans.forEach((p, i) => {
                const item = document.createElement('div');
                item.className = 'plan-card flex relative overflow-hidden bg-black/30 mb-3';
                item.innerHTML = `
                    <div class="drag-handle">::</div>
                    <div class="flex-1 p-3">
                        <div class="flex justify-between items-center">
                            <div>
                                <span class="tag-icon">TASK</span>
                                <span class="text-[10px] opacity-50 mr-2">${p.time}</span>
                                <span class="font-bold text-sm uppercase">${p.place}</span>
                            </div>
                            <button onclick="delSub(${i})" class="text-[11px] opacity-40">✕</button>
                        </div>
                    </div>
                `;
                list.appendChild(item);
            });
            document.getElementById('loc-num').innerText = trip.sub_plans.length.toString().padStart(2, '0');
            updateMap();
            localStorage.setItem('retro_travel_data', JSON.stringify(travelData));
        }

        function updateMap() {
            const mapImg = document.getElementById('map-img');
            const placeholder = document.getElementById('map-placeholder');
            
            if (trip && trip.sub_plans && trip.sub_plans.length > 0) {
                // 获取最后录入的一个地点
                const latestPlace = trip.sub_plans[trip.sub_plans.length - 1].place;
                
                // 重点：使用高德静态图 API (Amap Static Map)
                // location参数留空，使用 markers 参数进行地址解析标注
                const amapKey = 'ee95e5270a22f927ae5732dd8515647c'; 
                const url = `https://restapi.amap.com/v3/staticmap?markers=mid,,A:${encodeURIComponent(latestPlace)}&zoom=14&size=600*300&key=${amapKey}`;
                
                mapImg.src = url;
                mapImg.onload = () => {
                    mapImg.style.display = 'block';
                    placeholder.style.display = 'none';
                };
            } else {
                mapImg.style.display = 'none';
                placeholder.style.display = 'block';
            }
        }

        function addSub() {
            const time = document.getElementById('sub-time').value || '--:--';
            const place = document.getElementById('sub-place').value;
            if (!place) return;
            if(!trip.sub_plans) trip.sub_plans = [];
            trip.sub_plans.push({ time, place });
            document.getElementById('sub-place').value = '';
            render();
        }

        function delSub(i) {
            trip.sub_plans.splice(i, 1);
            render();
        }

        Sortable.create(document.getElementById('sub-list'), {
            handle: '.drag-handle',
            animation: 150,
            onEnd: () => {
                const newOrder = [];
                document.querySelectorAll('.plan-card').forEach((el, i) => {
                    // 同步拖拽后的数组顺序（逻辑略，保持当前数组即可）
                });
            }
        });

        window.onload = render;
    </script>
</body>
</html>
