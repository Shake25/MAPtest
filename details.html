<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MovingData | 轨迹动态分析终端</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-ant-path@1.3.0/dist/leaflet-ant-path.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap');
        :root { --retro-orange: #ffb000; --retro-bg: #0d0d0d; }
        body { background-color: var(--retro-bg); color: var(--retro-orange); font-family: 'Courier Prime', monospace; margin: 0; }
        
        /* 地图容器样式 */
        .map-frame { height: 380px; border: 1px solid var(--retro-orange); position: relative; background: #000; }
        #map { width: 100%; height: 100%; }

        /* 赛博朋克滤镜：让开源地图呈现 MovingPandas 的专业质感 */
        .leaflet-tile-container { filter: invert(100%) hue-rotate(170deg) brightness(0.5) contrast(1.2); }
        .leaflet-container { background: #000 !important; }
        
        input { background: rgba(255,176,0,0.05); border: 1px solid var(--retro-orange); color: var(--retro-orange); outline: none; padding: 12px; font-size: 14px; }
        .data-card { border-left: 3px solid var(--retro-orange); background: rgba(255,176,0,0.03); margin-bottom: 8px; padding: 10px; font-size: 12px; }
        .btn-update { background: var(--retro-orange); color: #000; font-weight: bold; transition: all 0.2s; }
        .btn-update:active { transform: scale(0.95); opacity: 0.8; }
    </style>
</head>
<body class="p-4">
    <div class="max-w-5xl mx-auto">
        <header class="mb-4 flex justify-between items-end border-b border-[#ffb000] pb-2">
            <div>
                <h1 class="text-xl font-bold tracking-widest uppercase">MovingData Terminal</h1>
                <p class="text-[9px] opacity-50">>> 基于开源 Trajectory 算法驱动</p>
            </div>
            <div id="status-tag" class="text-[10px] animate-pulse text-green-500">SYSTEM_READY</div>
        </header>

        <div class="map-frame mb-6 shadow-[0_0_20px_rgba(255,176,0,0.1)]">
            <div id="map"></div>
        </div>

        <div class="grid grid-cols-1 gap-4 mb-8">
            <div class="flex gap-2">
                <input id="input-place" type="text" placeholder="输入地点 (例: 深圳北站)" class="flex-1">
                <button onclick="processTrajectory()" class="btn-update px-6 py-3 uppercase text-xs">部署轨迹节点</button>
            </div>
        </div>

        <div id="trajectory-log" class="space-y-2">
            <div class="opacity-30 text-[10px] italic">等待原始地理数据注入...</div>
        </div>
    </div>

    <script>
        let map, antPath, markers = [];
        let trajectoryCoords = [];

        // 1. 初始化开源地图引擎
        function initEngine() {
            // 设置初始视角为中国中心
            map = L.map('map', { zoomControl: false }).setView([30.0, 105.0], 4);

            // 使用高德地图瓦片 (国内直连最稳方案)
            L.tileLayer('https://webrd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}', {
                subdomains: ["1", "2", "3", "4"]
            }).addTo(map);

            // 初始化动态轨迹线 (MovingPandas 风格)
            antPath = L.polyline.antPath([], {
                "paused": false, "reverse": false, "delay": 2000, "dashArray": [10, 20],
                "weight": 3, "color": "#ffb000", "pulseColor": "#ffffff"
            }).addTo(map);
        }

        // 2. 核心：处理并渲染轨迹
        async function processTrajectory() {
            const placeInput = document.getElementById('input-place');
            const placeName = placeInput.value.trim();
            if (!placeName) return;

            document.getElementById('status-tag').innerText = "CALCULATING...";

            try {
                // 使用公共地理编码接口解析地址
                const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(placeName)}`);
                const data = await response.json();

                if (data && data.length > 0) {
                    const lat = parseFloat(data[0].lat);
                    const lon = parseFloat(data[0].lon);
                    const newCoord = [lat, lon];

                    // 更新轨迹数据
                    trajectoryCoords.push(newCoord);
                    
                    // 添加地图标记
                    const marker = L.circleMarker(newCoord, {
                        radius: 5, color: '#ffb000', fillColor: '#ffb000', fillOpacity: 1
                    }).addTo(map).bindPopup(`节点: ${placeName}`).openPopup();
                    markers.push(marker);

                    // 更新动态轨迹线
                    antPath.setLatLngs(trajectoryCoords);

                    // 自动调整地图视野
                    map.fitBounds(antPath.getBounds(), { padding: [50, 50] });

                    // 更新侧边栏日志
                    updateLog(placeName, lat, lon);
                    
                    placeInput.value = "";
                    document.getElementById('status-tag').innerText = "DATA_SYNCED";
                } else {
                    alert("无法定位该地址，请尝试输入更具体的名称。");
                    document.getElementById('status-tag').innerText = "ADDR_ERROR";
                }
            } catch (error) {
                console.error("轨迹处理失败", error);
                document.getElementById('status-tag').innerText = "ENGINE_OFFLINE";
            }
        }

        function updateLog(name, lat, lon) {
            const log = document.getElementById('trajectory-log');
            if (trajectoryCoords.length === 1) log.innerHTML = "";
            
            const entry = document.createElement('div');
            entry.className = "data-card animate-fade-in";
            entry.innerHTML = `
                <div class="flex justify-between">
                    <span class="font-bold uppercase">POINT_${trajectoryCoords.length}</span>
                    <span class="opacity-50">${new Date().toLocaleTimeString()}</span>
                </div>
                <div class="mt-1 text-[10px]">LOC: ${name}</div>
                <div class="text-[9px] opacity-40">COORDS: ${lat.toFixed(4)}N, ${lon.toFixed(4)}E</div>
            `;
            log.prepend(entry);
        }

        window.onload = initEngine;
    </script>
</body>
</html>
