<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tactical Map | 实时路径终端</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script type="text/javascript">
        window._AMapSecurityConfig = { securityJsCode: '7a97262f3a61f2f8149e29a997d91d9e' };
    </script>
    <script type="text/javascript" src="https://webapi.amap.com/maps?v=2.0&key=ee95e5270a22f927ae5732dd8515647c&plugin=AMap.Driving,AMap.Geocoder"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap');
        :root { --retro-orange: #ffb000; --retro-bg: #121212; }
        body { background-color: var(--retro-bg); color: var(--retro-orange); font-family: 'Courier Prime', monospace; }
        .retro-border { border: 1px solid var(--retro-orange); }
        
        /* 地图黑金滤镜：让地图适配 UI 风格 */
        #container { width: 100%; height: 100%; filter: invert(90%) hue-rotate(180deg) brightness(0.6) contrast(1.3); }
        .amap-logo, .amap-copyright { display: none !important; }

        input { background: rgba(0,0,0,0.5); border: 1px solid var(--retro-orange); color: var(--retro-orange); outline: none; padding: 12px; border-radius: 0; }
        .plan-card { border-left: 4px solid var(--retro-orange); background: rgba(255,176,0,0.03); margin-bottom: 10px; }
        .drag-handle { cursor: grab; padding: 0 10px; background: rgba(255,176,0,0.1); display: flex; align-items: center; }
    </style>
</head>
<body class="p-3">
    <div class="max-w-6xl mx-auto retro-border p-4 relative bg-[#121212] min-h-[95vh] flex flex-col">
        <header class="mb-4 border-b border-[#ffb000] pb-2 flex justify-between items-end">
            <div>
                <h1 id="main-title" class="text-xl font-bold uppercase italic italic tracking-tighter">--</h1>
                <p class="text-[9px] opacity-60">>> 路径规划引擎已就绪 [NAV_SYSTEM_v2.0]</p>
            </div>
            <p id="loc-num" class="text-xl font-bold">00</p>
        </header>

        <div class="retro-border h-[300px] md:h-[450px] mb-6 relative bg-black overflow-hidden">
            <div id="container"></div>
        </div>

        <div class="flex flex-col gap-3 mb-6">
            <div class="flex gap-2">
                <input id="sub-time" type="text" placeholder="12:00" class="w-24 text-center">
                <input id="sub-place" type="text" placeholder="输入地点（如：香港西九龙）" class="flex-1">
            </div>
            <button onclick="addSub()" class="bg-[#ffb000] text-black py-4 font-bold text-xs uppercase active:scale-95 transition-all">部署坐标并同步路径</button>
        </div>

        <div id="sub-list" class="flex-1 overflow-y-auto"></div>
        
        <a href="index.html" class="block text-center text-[10px] py-4 border border-[#ffb000]/20 mt-4 uppercase tracking-[0.2em]">返回主控台</a>
    </div>

    <script>
        let travelData = JSON.parse(localStorage.getItem('retro_travel_data')) || [];
        let index = localStorage.getItem('current_trip_index');
        let trip = travelData[index];
        let map, driving;

        // 初始化高德地图
        function initAMap() {
            map = new AMap.Map('container', {
                zoom: 12,
                center: [114.1694, 22.3193], // 默认香港
                viewMode: '3D',
                mapStyle: 'amap://styles/dark' // 使用深色主题
            });

            // 初始化路线规划插件
            driving = new AMap.Driving({
                map: map,
                panel: false, // 不显示文字面板
                hideMarkers: false // 显示起点终点图标
            });
        }

        function render() {
            if (!trip) return;
            document.getElementById('main-title').innerText = trip.title;
            const list = document.getElementById('sub-list');
            list.innerHTML = '';
            
            if (!trip.sub_plans) trip.sub_plans = [];

            trip.sub_plans.forEach((p, i) => {
                const item = document.createElement('div');
                item.className = 'plan-card flex';
                item.innerHTML = `
                    <div class="drag-handle">::</div>
                    <div class="flex-1 p-3 flex justify-between items-center">
                        <div>
                            <span class="text-[10px] opacity-40 mr-2">${p.time}</span>
                            <span class="font-bold text-sm uppercase">${p.place}</span>
                        </div>
                        <button onclick="delSub(${i})" class="text-[10px] opacity-30">ERASE</button>
                    </div>
                `;
                list.appendChild(item);
            });

            document.getElementById('loc-num').innerText = trip.sub_plans.length.toString().padStart(2, '0');
            calculateRoute(); // 渲染后自动重绘路线
            localStorage.setItem('retro_travel_data', JSON.stringify(travelData));
        }

        // 核心功能：自动计算路径
        function calculateRoute() {
            if (!driving || trip.sub_plans.length < 1) return;

            // 清除旧路径
            driving.clear();

            const points = trip.sub_plans.map(p => p.place);

            if (points.length === 1) {
                // 只有一个地址时，仅做地理编码显示位置
                const geocoder = new AMap.Geocoder();
                geocoder.getLocation(points[0], (status, result) => {
                    if (status === 'complete' && result.geocodes.length) {
                        const loc = result.geocodes[0].location;
                        map.setZoomAndCenter(14, loc);
                        new AMap.Marker({ position: loc, map: map });
                    }
                });
            } else if (points.length >= 2) {
                // 两个及以上地址，开始规划路线
                const start = points[0];
                const end = points[points.length - 1];
                const waypoints = points.slice(1, -1); // 中途经过的地点

                driving.search(
                    [{ keyword: start }, ...waypoints.map(w => ({ keyword: w })), { keyword: end }],
                    function(status, result) {
                        if (status !== 'complete') {
                            console.error('路径规划失败:', result);
                        }
                    }
                );
            }
        }

        function addSub() {
            const time = document.getElementById('sub-time').value || '--:--';
            const place = document.getElementById('sub-place').value;
            if (!place) return;
            trip.sub_plans.push({ time, place });
            document.getElementById('sub-place').value = '';
            render();
        }

        function delSub(i) {
            trip.sub_plans.splice(i, 1);
            render();
        }

        window.onload = () => {
            initAMap();
            render();
        };

        // 绑定拖拽排序逻辑（略，可直接复用之前的 SortableJS 配置）
        Sortable.create(document.getElementById('sub-list'), {
            handle: '.drag-handle',
            animation: 150,
            onEnd: render // 排序结束后重新渲染并绘图
        });
    </script>
</body>
</html>
